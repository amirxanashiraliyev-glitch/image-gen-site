<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ro'yxatdan o'tish — AI Rasm Generator</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">✦</div>
      <h1>AI Rasm Generator</h1>
    </div>

    <!-- STEP 1: Register Form -->
    <div id="step-register">
      <h2 class="auth-title">Hisob yaratish</h2>
      <p class="auth-subtitle">Bepul ro'yxatdan o'ting va rasm yaratishni boshlang</p>

      <div id="alert-box"></div>

      <button class="btn btn-google" onclick="googleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
        Kirish Google orqali
      </button>

      <div class="auth-divider">yoki</div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="siz@example.com" required/>
        </div>
        <div class="form-group">
          <label>Parol</label>
          <input type="password" id="password" placeholder="Kamida 8 ta belgi" required minlength="8"/>
        </div>
        <div class="form-group">
          <label>Parolni tasdiqlang</label>
          <input type="password" id="confirm_password" placeholder="Parolni qayta kiriting" required/>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="reg-btn">
          <span id="reg-btn-text">Ro'yxatdan o'tish</span>
        </button>
      </form>
    </div>

    <!-- STEP 2: Email Verification -->
    <div id="step-verify" class="hidden">
      <h2 class="auth-title">Email tasdiqlash</h2>
      <p class="auth-subtitle">
        <span id="verify-email-display" class="text-accent"></span><br/>
        manziliga 6 raqamli kod yuborildi
      </p>

      <div id="alert-box-verify"></div>

      <div class="code-inputs">
        <input type="text" class="code-input" maxlength="1" oninput="codeInput(this,0)" onkeydown="codeBack(event,0)"/>
        <input type="text" class="code-input" maxlength="1" oninput="codeInput(this,1)" onkeydown="codeBack(event,1)"/>
        <input type="text" class="code-input" maxlength="1" oninput="codeInput(this,2)" onkeydown="codeBack(event,2)"/>
        <input type="text" class="code-input" maxlength="1" oninput="codeInput(this,3)" onkeydown="codeBack(event,3)"/>
        <input type="text" class="code-input" maxlength="1" oninput="codeInput(this,4)" onkeydown="codeBack(event,4)"/>
        <input type="text" class="code-input" maxlength="1" oninput="codeInput(this,5)" onkeydown="codeBack(event,5)"/>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="verify-btn" onclick="verifyCode()">
        <span id="verify-btn-text">Tasdiqlash</span>
      </button>

      <div style="text-align:center; margin-top:16px;">
        <button class="btn btn-ghost btn-sm" onclick="resendCode()" id="resend-btn">
          Kodni qayta yuborish
        </button>
        <div id="resend-timer" class="text-muted" style="font-size:0.78rem; margin-top:8px; font-family:'JetBrains Mono',monospace;"></div>
      </div>
    </div>

    <div class="auth-footer">
      Hisobingiz bormi? <a href="login.html">Kiring</a>
    </div>
  </div>
</div>

<script>
let currentEmail = '';
let resendCountdown = 0;
let resendTimer = null;

function showAlert(msg, type='error', boxId='alert-box') {
  const box = document.getElementById(boxId);
  if(!box) return;
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { box.innerHTML = ''; }, 6000);
}

async function handleRegister(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm_password').value;

  if(password !== confirm) { showAlert('Parollar mos emas!'); return; }
  if(password.length < 8) { showAlert('Parol kamida 8 ta belgi bo\'lishi kerak'); return; }

  const btn = document.getElementById('reg-btn');
  const btnText = document.getElementById('reg-btn-text');
  btn.disabled = true;
  btnText.textContent = 'Yuklanmoqda...';

  try {
    const res = await fetch('index.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `action=register&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if(data.success) {
      currentEmail = email;
      document.getElementById('verify-email-display').textContent = email;
      document.getElementById('step-register').classList.add('hidden');
      document.getElementById('step-verify').classList.remove('hidden');
      startResendTimer(60);
    } else {
      showAlert(data.message || 'Xatolik yuz berdi');
      btn.disabled = false;
      btnText.textContent = "Ro'yxatdan o'tish";
    }
  } catch(err) {
    showAlert('Server bilan bog\'lanishda xatolik');
    btn.disabled = false;
    btnText.textContent = "Ro'yxatdan o'tish";
  }
}

function codeInput(el, idx) {
  el.value = el.value.replace(/\D/,'');
  const inputs = document.querySelectorAll('.code-input');
  if(el.value && idx < 5) inputs[idx+1].focus();
  if(el.value && idx === 5) verifyCode();
}

function codeBack(e, idx) {
  if(e.key === 'Backspace' && !e.target.value && idx > 0) {
    document.querySelectorAll('.code-input')[idx-1].focus();
  }
}

async function verifyCode() {
  const inputs = document.querySelectorAll('.code-input');
  // Fix 1: trim each digit, join as clean string
  const code = Array.from(inputs).map(i => i.value.trim()).join('');
  if(code.length < 6) {
    showAlert('Iltimos, to\'liq 6 raqamli kodni kiriting', 'error', 'alert-box-verify');
    return;
  }

  const btn = document.getElementById('verify-btn');
  const btnText = document.getElementById('verify-btn-text');
  btn.disabled = true;
  btnText.textContent = 'Tekshirilmoqda...';

  try {
    const res = await fetch('index.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      // Fix 2: send email as lowercase to match PHP strtolower()
      body: `action=verify_email&email=${encodeURIComponent(currentEmail.trim().toLowerCase())}&code=${encodeURIComponent(code)}`
    });

    // Fix 3: read raw text first — if PHP returns HTML error, show it clearly
    const text = await res.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch(parseErr) {
      // PHP returned HTML instead of JSON — show raw error for debugging
      showAlert('Server xatosi: ' + text.substring(0, 120), 'error', 'alert-box-verify');
      btn.disabled = false;
      btnText.textContent = 'Tasdiqlash';
      return;
    }

    if(data.success) {
      showAlert('Email tasdiqlandi! Yo\'naltirilmoqda...', 'success', 'alert-box-verify');
      setTimeout(() => { window.location.href = 'index.php'; }, 1200);
    } else {
      showAlert(data.message || 'Noto\'g\'ri kod', 'error', 'alert-box-verify');
      btn.disabled = false;
      btnText.textContent = 'Tasdiqlash';
    }
  } catch(err) {
    showAlert('Tarmoq xatosi: ' + err.message, 'error', 'alert-box-verify');
    btn.disabled = false;
    btnText.textContent = 'Tasdiqlash';
  }
}

async function resendCode() {
  if(resendCountdown > 0) return;
  document.getElementById('resend-btn').disabled = true;

  try {
    const res = await fetch('index.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `action=resend_code&email=${encodeURIComponent(currentEmail)}`
    });
    const data = await res.json();
    if(data.success) {
      showAlert('Kod qayta yuborildi', 'success', 'alert-box-verify');
      startResendTimer(60);
    } else {
      showAlert(data.message || 'Xatolik', 'error', 'alert-box-verify');
      document.getElementById('resend-btn').disabled = false;
    }
  } catch(e) {
    document.getElementById('resend-btn').disabled = false;
  }
}

function startResendTimer(seconds) {
  resendCountdown = seconds;
  document.getElementById('resend-btn').disabled = true;
  const timerEl = document.getElementById('resend-timer');
  clearInterval(resendTimer);
  resendTimer = setInterval(() => {
    resendCountdown--;
    timerEl.textContent = resendCountdown > 0 ? `${resendCountdown}s dan so'ng qayta yuborish mumkin` : '';
    if(resendCountdown <= 0) {
      clearInterval(resendTimer);
      document.getElementById('resend-btn').disabled = false;
    }
  }, 1000);
}

function googleLogin() {
  window.location.href = 'index.php?action=google_auth';
}
</script>
</body>
</html>
