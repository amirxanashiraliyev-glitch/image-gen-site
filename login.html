<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kirish — AI Rasm Generator</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">✦</div>
      <h1>AI Rasm Generator</h1>
    </div>
    <h2 class="auth-title">Xush kelibsiz</h2>
    <p class="auth-subtitle">Hisobingizga kiring va rasmlar yarating</p>

    <div id="alert-box"></div>

    <button class="btn btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Kirish Google orqali
    </button>

    <div class="auth-divider">yoki</div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="siz@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label>Parol</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
        <span id="login-btn-text">Kirish</span>
      </button>
    </form>

    <div class="auth-footer">
      Hisobingiz yo'qmi? <a href="signup.html">Ro'yxatdan o'ting</a>
    </div>
  </div>
</div>

<script>
function showAlert(msg, type='error') {
  const box = document.getElementById('alert-box');
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => { box.innerHTML = ''; }, 5000);
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const btnText = document.getElementById('login-btn-text');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btnText.textContent = 'Kirish...';

  try {
    const res = await fetch('index.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: `action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if(data.success) {
      showAlert('Muvaffaqiyatli kirildi! Yo\'naltirilmoqda...', 'success');
      setTimeout(() => { window.location.href = 'index.php'; }, 800);
    } else {
      showAlert(data.message || 'Kirish amalga oshmadi');
      btn.disabled = false;
      btnText.textContent = 'Kirish';
    }
  } catch(err) {
    showAlert('Xatolik yuz berdi. Qayta urinib ko\'ring.');
    btn.disabled = false;
    btnText.textContent = 'Kirish';
  }
}

function googleLogin() {
  window.location.href = 'index.php?action=google_auth';
}
</script>
</body>
</html>
